<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Kampus Kuryesi</title>

  <!-- Oyun stilleri — GitHub (jsDelivr CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/erhan3861/kampus-kuryesi@main/src/ui/ui.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #game-canvas { display: block; width: 100vw; height: 100vh; }
    #loading-screen {
      position: fixed; inset: 0; background: #2d5a27;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000; color: white;
    }
    #loading-screen h1 { font-size: 2.5rem; margin-bottom: 1rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    #loading-screen p  { font-size: 1.1rem; opacity: 0.8; margin-bottom: 2rem; }
    #loading-bar-bg { width: 300px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; }
    #loading-bar    { height: 100%; background: #7bc67e; border-radius: 6px; transition: width 0.3s; width: 0%; }
    #start-btn {
      display: none; margin-top: 2rem; padding: 12px 32px;
      background: #f6c90e; color: #1a1a1a; border: none; border-radius: 25px;
      font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: transform 0.1s;
    }
    #start-btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="loading-screen">
    <h1>🎒 Kampüs Kuryesi</h1>
    <p>Kampüs yükleniyor...</p>
    <div id="loading-bar-bg"><div id="loading-bar"></div></div>
    <button id="start-btn" onclick="window.__startGame && window.__startGame()">Oyuna Başla ▶</button>
  </div>

  <!--
    CDN_BASE: Tüm JS modülleri jsDelivr üzerinden bu repo'dan yüklenir.
    Farklı bir sunucudan çalışıyor olsan da CORS sorunsuz çalışır.

    quests.json: Öğretmen bu dosyayı değiştirerek içeriği özelleştirir.
    npcs.json  : NPC verileri.
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/examples/jsm/loaders/GLTFLoader.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
      "three/examples/jsm/loaders/DRACOLoader.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/DRACOLoader.js"
    }
  }
  </script>

  <script type="module">
    // Oyun modülleri — jsDelivr CDN üzerinden GitHub repo'dan
    const BASE = 'https://cdn.jsdelivr.net/gh/erhan3861/kampus-kuryesi@main/src';

    // JSON verileri — fetch ile yükle (öğretmen bunları düzenler)
    const [npcData, questData] = await Promise.all([
      fetch(`${BASE}/data/npcs.json`).then(r => r.json()),
      fetch(`${BASE}/data/quests.json`).then(r => r.json()),
    ]);

    // Modülleri dinamik import ile yükle
    const [
      { Engine },
      { Input },
      { Audio },
      { World },
      { Player },
      { NPC },
      { Customization },
      { Dialogue },
      { Emote },
      { QuestSystem },
      { PlayerStats },
      { LearningLog },
      { HUD },
      { Minimap },
      { TeacherPanel },
    ] = await Promise.all([
      import(`${BASE}/core/Engine.js`),
      import(`${BASE}/core/Input.js`),
      import(`${BASE}/core/Audio.js`),
      import(`${BASE}/world/World.js`),
      import(`${BASE}/entities/Player.js`),
      import(`${BASE}/entities/NPC.js`),
      import(`${BASE}/entities/Customization.js`),
      import(`${BASE}/systems/Dialogue.js`),
      import(`${BASE}/systems/Emote.js`),
      import(`${BASE}/systems/QuestSystem.js`),
      import(`${BASE}/systems/PlayerStats.js`),
      import(`${BASE}/systems/LearningLog.js`),
      import(`${BASE}/ui/HUD.js`),
      import(`${BASE}/ui/Minimap.js`),
      import(`${BASE}/ui/TeacherPanel.js`),
    ]);

    // ── YÜKLEME EKRANI ──────────────────────────────────────────────────────────
    const loadingBar    = document.getElementById('loading-bar');
    const startBtn      = document.getElementById('start-btn');
    const loadingScreen = document.getElementById('loading-screen');
    let gameReady = false, gameStarted = false;
    function setProgress(p) { if (loadingBar) loadingBar.style.width = `${p}%`; }

    // ── CORE ────────────────────────────────────────────────────────────────────
    const canvas = document.getElementById('game-canvas');
    const engine = new Engine(canvas);
    const input  = new Input();
    const audio  = new Audio();
    setProgress(20);

    const world = new World(engine.scene);
    setProgress(45);
    const col = world.collision;
    setProgress(60);

    // ── UI ──────────────────────────────────────────────────────────────────────
    const dialogue = new Dialogue();
    const hud      = new HUD(questData.length);
    const minimap  = new Minimap();
    const emote    = new Emote();
    setProgress(70);

    // ── STATS ───────────────────────────────────────────────────────────────────
    const stats = new PlayerStats({
      maxHP: 3, maxJoker: 2,
      onDead:   () => hud.showDeath(),
      onUpdate: (type, val) => {
        hud.updateStats(stats.getSummary());
        if (type === 'levelup') hud.showNotification(`⚡ Seviye ${val}! +1 Joker kazandın!`, '#b48eff');
      },
    });
    hud.updateStats(stats.getSummary());

    // ── OYUNCU & NPC'LER ────────────────────────────────────────────────────────
    const customization = new Customization(colors => player?.applyColors(colors));
    const player = new Player(engine.scene);
    const npcs   = npcData.map(d => new NPC(engine.scene, { ...d, color: parseInt(d.color) }));
    setProgress(80);

    // ── ÖĞRENME & GÖREVLER ──────────────────────────────────────────────────────
    const learningLog  = new LearningLog();
    const teacherPanel = new TeacherPanel(learningLog);
    const questSystem  = new QuestSystem(questData, dialogue, world, hud, audio, stats, learningLog);
    questSystem.onMinimapUpdate(target => minimap.setActiveTarget(target));

    // ── KAMERA DÖNDÜRME ─────────────────────────────────────────────────────────
    const CAM_ROTATE_SPEED = 1.8;
    {
      let dragging = false, lastMX = 0;
      window.addEventListener('mousedown',    e => { if (e.button === 2 || e.button === 1) { dragging = true; lastMX = e.clientX; } });
      window.addEventListener('mousemove',    e => { if (!dragging) return; player.cameraYaw -= (e.clientX - lastMX) * 0.007; lastMX = e.clientX; });
      window.addEventListener('mouseup',      () => { dragging = false; });
      window.addEventListener('contextmenu',  e => e.preventDefault());
      let tid = null, tlx = 0;
      window.addEventListener('touchstart', e => { for (const t of e.changedTouches) { if (t.clientX > window.innerWidth * 0.45 && tid === null) { tid = t.identifier; tlx = t.clientX; } } }, { passive: true });
      window.addEventListener('touchmove',  e => { for (const t of e.changedTouches) { if (t.identifier === tid) { player.cameraYaw -= (t.clientX - tlx) * 0.009; tlx = t.clientX; } } }, { passive: true });
      window.addEventListener('touchend',   e => { for (const t of e.changedTouches) if (t.identifier === tid) tid = null; });
    }

    // ── MOBİL BUTON ─────────────────────────────────────────────────────────────
    const interactBtn = document.createElement('button');
    interactBtn.textContent = 'E';
    interactBtn.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:300;width:50px;height:50px;background:rgba(246,201,14,0.9);border:2px solid #f6c90e;border-radius:50%;color:#1a1a1a;font-size:1.2rem;font-weight:bold;cursor:pointer;display:none;';
    interactBtn.ontouchstart = e => { e.preventDefault(); input.interactPressed = true; };
    interactBtn.onclick      = () => { input.interactPressed = true; };
    document.body.appendChild(interactBtn);
    if ('ontouchstart' in window) interactBtn.style.display = 'flex';

    const interactHint = document.createElement('div');
    interactHint.style.cssText = 'position:fixed;bottom:80px;right:12px;z-index:300;background:rgba(246,201,14,0.92);color:#1a1a1a;padding:4px 12px;border-radius:12px;font-size:0.8rem;font-weight:bold;display:none;pointer-events:none;';
    document.body.appendChild(interactHint);

    const collectHint = document.createElement('div');
    collectHint.style.cssText = 'position:fixed;bottom:112px;right:12px;z-index:300;background:rgba(255,215,0,0.95);color:#1a1a1a;padding:4px 14px;border-radius:12px;font-size:0.82rem;font-weight:bold;display:none;pointer-events:none;border:2px solid #f6a000;';
    document.body.appendChild(collectHint);

    // ── OYUN BAŞLAT ─────────────────────────────────────────────────────────────
    import('three').then(({ Vector3 }) => {
      const _v3 = new Vector3();
      function worldToScreen(wx, wy, wz) {
        _v3.set(wx, wy, wz).project(engine.camera);
        return { x: (_v3.x + 1) / 2 * window.innerWidth, y: (-_v3.y + 1) / 2 * window.innerHeight };
      }

      setProgress(95);
      function startGame() {
        if (gameStarted) return;
        gameStarted = true;
        loadingScreen.style.transition = 'opacity 0.5s';
        loadingScreen.style.opacity = '0';
        setTimeout(() => loadingScreen.style.display = 'none', 600);
        audio.resume(); audio.startAmbient();
        hud.showNotification('👋 Hoş geldin! Hocalara yaklaş ve [E] bas.', '#f6c90e');
        gameLoop();
      }
      setProgress(100);
      setTimeout(() => { gameReady = true; if (startBtn) startBtn.style.display = 'block'; }, 500);
      window.__startGame = startGame;
      canvas.addEventListener('click',      () => { if (!gameStarted && gameReady) startGame(); audio.resume(); });
      canvas.addEventListener('touchstart', () => audio.resume(), { passive: true });

      let time = 0, nearNPC = null, nearDist = Infinity;
      function gameLoop() {
        requestAnimationFrame(gameLoop);
        const dt = engine.getDelta();
        time += dt;
        if (input.keys['KeyQ']) player.cameraYaw += CAM_ROTATE_SPEED * dt;
        if (input.keys['KeyR']) player.cameraYaw -= CAM_ROTATE_SPEED * dt;
        if (dialogue.isOpen) { player.updateCamera(engine.camera); engine.render(); return; }
        player.update(dt, input, col);
        player.updateCamera(engine.camera);
        const pos = player.getPosition();
        nearNPC = null; nearDist = Infinity;
        npcs.forEach(npc => {
          npc.update(dt, engine.camera, pos);
          const d = npc.distanceTo(pos);
          if (d < nearDist) { nearDist = d; nearNPC = npc; }
        });
        npcs.forEach(npc => {
          const av = questSystem.getAvailableFor(npc.id).length > 0;
          const ac = questSystem.getActiveFor(npc.id).length > 0;
          npc.setIndicator(av ? '!' : ac ? '?' : 'none');
        });
        if (nearNPC && nearDist < 4.5) { interactHint.style.display = 'block'; interactHint.textContent = `[E] ${nearNPC.name}`; }
        else interactHint.style.display = 'none';
        if (input.consumeInteract() && nearNPC && nearDist < 4.5) { audio.play('interact'); questSystem.interactNPC(nearNPC.id, npcData); }
        questSystem.checkCollectibles(pos);
        questSystem.checkExplore(pos, npcData);
        const nearCol = world.collectibles.filter(c => !c.collected).find(c => c.mesh.position.distanceTo(pos) < 4);
        if (nearCol) { collectHint.style.display = 'block'; collectHint.textContent = '⭐ Yaklaş — otomatik toplanır!'; }
        else collectHint.style.display = 'none';
        const sc = worldToScreen(pos.x, pos.y + 2.8, pos.z);
        emote.updateBubblePosition(sc.x, sc.y);
        world.update(time);
        const minimapNPCs = questSystem.getMinimapNPCInfo(npcs, npcData);
        minimap.setNPCs(minimapNPCs);
        const collectibleDots = world.collectibles.filter(c => !c.collected).map(c => ({ x: c.mesh.position.x, z: c.mesh.position.z }));
        minimap.setCollectibles(collectibleDots);
        minimap.update(pos.x, pos.z, player.facingAngle);
        engine.render();
      }
    });
  </script>
</body>
</html>
